name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  SERVICE: nutrimind-frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Cloud Authentication
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="$REGION-docker.pkg.dev/$PROJECT_ID/nutrimind-repo/$SERVICE:${{ github.sha }}"
          docker build -t $IMAGE_PATH .
          docker push $IMAGE_PATH

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/nutrimind-repo/${{ env.SERVICE }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
          env_vars: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIRESTORE_KEY }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIRESTORE_PROJECT }}
